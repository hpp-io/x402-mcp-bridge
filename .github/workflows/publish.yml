name: Publish to npm

# Two trigger paths:
#
#   1. Tag push (recommended)        — `git tag vX.Y.Z && git push --tags`
#                                      publishes the version that's in
#                                      package.json (must match the tag,
#                                      we verify below).
#
#   2. Manual workflow_dispatch      — for ad-hoc / hotfix publishes from
#                                      the Actions tab. Bumps to the
#                                      package.json version as-is.
#
# Required repo secret:
#   NPM_TOKEN   — npm automation token with publish access to @hpp-io
#                 (npmjs.com → Profile → Access Tokens → Generate
#                  "Automation" token, scope = @hpp-io)
#
# Provenance: enabled — links the published package to this exact
# workflow run on GitHub. Requires `id-token: write` permission and
# matching repo visibility (works on public repos, also on private
# with the package publicly published).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run npm publish --dry-run (no actual publish)'
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm provenance via Sigstore
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # ---- Tag/version sanity ----------------------------------------
      - name: Verify tag matches package.json
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match git tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Publishing $PKG_VERSION"

      # ---- Build + lint ---------------------------------------------
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

      # ---- Publish ---------------------------------------------------
      - name: npm publish
        if: ${{ !inputs.dry_run }}
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: npm publish (dry-run)
        if: ${{ inputs.dry_run }}
        run: npm publish --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ---- Summary ---------------------------------------------------
      - name: Summary
        if: always()
        run: |
          echo "### Publish summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Ref: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dry run: ${{ inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Version: $(node -p "require('./package.json').version")" >> $GITHUB_STEP_SUMMARY
